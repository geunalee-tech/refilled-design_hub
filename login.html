<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Refilled Design Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 3C16 3 7 13 7 20a9 9 0 0 0 18 0C25 13 16 3 16 3Z' fill='%23006DE2'/></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:#0E1116;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:18px;padding:44px 40px 36px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .logo strong{font-size:20px;font-weight:900;letter-spacing:-.3px}
  .logo span{font-size:11px;color:#7A8494;letter-spacing:2px;text-transform:uppercase;display:block;text-align:left}
  h1{font-size:16.5px;font-weight:700;margin:22px 0 6px}
  p.sub{font-size:12.5px;color:#7A8494;line-height:1.7;margin-bottom:26px}
  #gsi-btn{display:flex;justify-content:center;min-height:44px}
  .msg{margin-top:18px;font-size:12.5px;line-height:1.7;border-radius:10px;padding:11px 14px;display:none;text-align:left}
  .msg.err{display:block;background:#FBEDEA;color:#9A3B2E;border:1px solid #EFD2CB}
  .msg.info{display:block;background:#EEF3FD;color:#2B4A8B;border:1px solid #D7E2F7}
  .foot{margin-top:26px;font-size:11px;color:#A8B0BC}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid #C9D2DF;border-top-color:#2D6AFF;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" width="30" height="30"><path d="M16 3C16 3 7 13 7 20a9 9 0 0 0 18 0C25 13 16 3 16 3Z" fill="#006DE2"/><circle cx="13" cy="19" r="2.6" fill="#fff" opacity=".55"/></svg>
    <div><strong>Refilled</strong><span>Design Hub</span></div>
  </div>
  <h1>팀 허브 로그인</h1>
  <p class="sub">Constant 멤버 전용 공간이에요.<br>회사 구글 계정으로 로그인해주세요.</p>
  <div id="gsi-btn"><span class="spin"></span></div>
  <div class="msg" id="msg"></div>
  <div class="foot">로그인 상태는 이 브라우저에서 30일간 유지돼요</div>
</div>
<script>
  const msg = document.getElementById('msg');
  const show = (text, cls) => { msg.textContent = text; msg.className = 'msg ' + cls; };

  async function onCredential(resp) {
    show('확인 중…', 'info');
    try {
      const r = await fetch('/api/auth/session', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: resp.credential }),
      });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.ok) { show('환영해요, ' + (j.name || '') + '님! 허브로 이동할게요…', 'info'); location.href = '/'; }
      else show(j.error || '로그인에 실패했어요. 다시 시도해주세요.', 'err');
    } catch { show('네트워크 오류가 발생했어요. 다시 시도해주세요.', 'err'); }
  }

  async function init() {
    let cfg = null;
    try { cfg = await (await fetch('/api/auth/config')).json(); } catch {}
    if (!cfg || !cfg.clientId) {
      document.getElementById('gsi-btn').innerHTML = '';
      return show('로그인이 아직 설정되지 않았어요. Vercel 환경변수에 GOOGLE_CLIENT_ID · SESSION_SECRET · ALLOWED_DOMAIN(또는 ALLOWED_EMAILS)을 등록하고 재배포해주세요.', 'info');
    }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => {
      google.accounts.id.initialize({ client_id: cfg.clientId, callback: onCredential, auto_select: true });
      document.getElementById('gsi-btn').innerHTML = '';
      google.accounts.id.renderButton(document.getElementById('gsi-btn'),
        { theme: 'outline', size: 'large', width: 300, text: 'signin_with', locale: 'ko' });
    };
    s.onerror = () => { document.getElementById('gsi-btn').innerHTML = ''; show('구글 로그인 스크립트를 불러오지 못했어요. 네트워크를 확인하고 새로고침해주세요.', 'err'); };
    document.head.appendChild(s);
  }
  init();
</script>
</body>
</html>
